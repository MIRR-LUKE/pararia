name: Conversation Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conversation-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pararia_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pararia_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pararia_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/pararia_ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Prepare test database
        run: npm run prisma:test:prepare

      - name: Typecheck
        run: npm run typecheck

      - name: Transcript review regression
        run: npm run test:transcript-review

      - name: Artifact semantics regression
        run: npx tsx scripts/test-conversation-artifact-semantics.ts

      - name: Conversation eval gate
        run: |
          mkdir -p artifacts
          npm run test:conversation-eval -- --out artifacts/conversation-eval-report.md

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conversation-eval-report
          path: artifacts/conversation-eval-report.md
          if-no-files-found: warn
