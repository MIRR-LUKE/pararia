name: Production Recording Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Smoke target URL"
        required: false
        default: "https://pararia.vercel.app"
  deployment_status:

concurrency:
  group: production-recording-smoke-${{ github.event_name }}-${{ github.event_name == 'deployment_status' && github.event.deployment.id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  production-recording-smoke:
    name: production-recording-smoke
    if: github.event_name == 'workflow_dispatch' || (github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
      DIRECT_URL: ${{ secrets.SUPABASE_DB_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      CRITICAL_PATH_SMOKE_EMAIL: ${{ secrets.PRODUCTION_INTEGRITY_AUDIT_EMAIL }}
      CRITICAL_PATH_SMOKE_PASSWORD: ${{ secrets.PRODUCTION_INTEGRITY_AUDIT_PASSWORD }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PARARIA_ALLOW_REMOTE_FIXTURES: "1"
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
      RUNPOD_WORKER_NAME: ${{ vars.RUNPOD_WORKER_NAME }}
      DEFAULT_RUNPOD_WORKER_IMAGE: ${{ vars.RUNPOD_WORKER_IMAGE }}
      RECORDING_UI_OUTPUT: .tmp/recording-ui-production-post-deploy.json
    steps:
      - name: Check smoke secrets
        id: recording_smoke_secrets
        shell: bash
        run: |
          missing=()
          for key in DATABASE_URL BLOB_READ_WRITE_TOKEN CRITICAL_PATH_SMOKE_EMAIL CRITICAL_PATH_SMOKE_PASSWORD RUNPOD_API_KEY CRON_SECRET; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Production recording smoke skipped because required GitHub secrets are missing: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        uses: actions/checkout@v4

      - name: Resolve Runpod worker image
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        id: worker_image
        shell: bash
        env:
          DEPLOY_SHA: ${{ github.event_name == 'deployment_status' && github.event.deployment.sha || github.sha }}
          DEFAULT_RUNPOD_WORKER_IMAGE: ${{ env.DEFAULT_RUNPOD_WORKER_IMAGE }}
          GH_TOKEN: ${{ github.token }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          owner="$(echo "${GHCR_OWNER}" | tr '[:upper:]' '[:lower:]')"
          candidate="ghcr.io/${owner}/pararia-runpod-worker:sha-${DEPLOY_SHA}"
          latest="${DEFAULT_RUNPOD_WORKER_IMAGE:-}"

          changed_files="$(git diff-tree --no-commit-id --name-only -r "${DEPLOY_SHA}" || true)"
          worker_changed=false
          while IFS= read -r file; do
            [ -n "${file}" ] || continue
            case "${file}" in
              Dockerfile.runpod-worker|.dockerignore|package.json|package-lock.json|prisma/*|scripts/run-runpod-worker.ts|scripts/faster_whisper_worker.py|scripts/runpod-worker-start.sh|scripts/requirements.runpod-worker.txt|lib/ai/stt.ts|lib/ai/stt/*|lib/audio-processing.ts|lib/audio-storage.ts|lib/env.ts|lib/recording/policy.ts|lib/recording/validation.ts|lib/runpod/remote-stt-client.ts|lib/runpod/remote-stt-types.ts|lib/runpod/runtime-metadata.ts|lib/runpod/stt/*|lib/runpod/worker-stop.ts|lib/runtime-paths.ts|lib/transcript/preprocess.ts|lib/transcript/source.ts|lib/user-facing-japanese.ts)
                worker_changed=true
                break
                ;;
            esac
          done <<< "${changed_files}"

          if [ "${worker_changed}" = "true" ]; then
            echo "Worker-affecting files changed in ${DEPLOY_SHA}; waiting for ${candidate}"
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            for attempt in $(seq 1 30); do
              if docker manifest inspect "${candidate}" >/dev/null 2>&1; then
                echo "image=${candidate}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              sleep 10
            done
            echo "::error::Runpod worker image was not published in time: ${candidate}"
            exit 1
          fi

          if [ -n "${latest}" ]; then
            echo "Using latest published Runpod worker image: ${latest}"
            echo "image=${latest}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No latest Runpod worker image variable is configured; falling back to ${candidate}"
          echo "image=${candidate}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        run: npm ci

      - name: Generate Prisma client
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        run: npm run prisma:generate

      - name: Resolve smoke target
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "base_url=${{ github.event.inputs.base_url || 'https://pararia.vercel.app' }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://pararia.vercel.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Write recording smoke env file
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        shell: bash
        run: |
          mkdir -p .tmp
          cat <<EOF > .tmp/.env.production.recording-smoke
          DATABASE_URL=${DATABASE_URL}
          DIRECT_URL=${DIRECT_URL}
          BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
          NEXTAUTH_URL=${{ steps.target.outputs.base_url }}
          CRON_SECRET=${CRON_SECRET}
          RUNPOD_API_KEY=${RUNPOD_API_KEY}
          RUNPOD_WORKER_NAME=${RUNPOD_WORKER_NAME}
          RUNPOD_WORKER_IMAGE=${{ steps.worker_image.outputs.image }}
          EOF

      - name: Run production recording smoke
        if: ${{ steps.recording_smoke_secrets.outputs.ready == 'true' }}
        run: >
          npm run test:teacher-recording-smoke --
          --label production-post-deploy-${{ github.run_id }}
          --base-url "${{ steps.target.outputs.base_url }}"
          --env-file .tmp/.env.production.recording-smoke
          --output "${RECORDING_UI_OUTPUT}"

      - name: Summarize recording smoke result
        if: ${{ always() && steps.recording_smoke_secrets.outputs.ready == 'true' }}
        shell: bash
        run: |
          if [ ! -f "${RECORDING_UI_OUTPUT}" ]; then
            echo "No recording smoke artifact was produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node --input-type=module <<'EOF'
          import { readFileSync, appendFileSync } from "node:fs";

          const outputPath = process.env.RECORDING_UI_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const result = JSON.parse(readFileSync(outputPath, "utf8"));
          const lines = [
            "## Production Recording Smoke",
            "",
            `- Base URL: ${result.baseUrl}`,
            `- Completion: ${result.completionState}`,
            `- Runpod stopped after STT: ${result.runpodStoppedAfterStt ?? "n/a"}`,
            `- Runpod stopped after run: ${result.runpodStoppedAfterRun}`,
            `- Next meeting memo status: ${result.nextMeetingMemoStatus ?? "null"}`,
            `- Observed states: ${(result.observedStates ?? []).join(" -> ")}`,
            `- Candidate count: ${result.candidateCount ?? "n/a"}`,
            `- Simulated recording ms: ${result.simulatedRecordingMs ?? "n/a"}`,
            `- Total ms: ${result.totalMs}`,
            `- Session ID: ${result.createdSessionId ?? "null"}`,
            `- Conversation ID: ${result.createdConversationId ?? "null"}`,
            `- Console errors: ${(result.consoleErrors ?? []).length}`,
            "",
          ];
          appendFileSync(summaryPath, `${lines.join("\n")}\n`, "utf8");
          EOF

      - name: Upload recording smoke artifact
        if: ${{ always() && steps.recording_smoke_secrets.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: production-recording-smoke
          path: .tmp/recording-ui-production-post-deploy.json
          if-no-files-found: warn
