name: Publish Runpod Worker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.runpod-worker
      - .dockerignore
      - package.json
      - package-lock.json
      - prisma/**
      - scripts/run-runpod-worker.ts
      - scripts/faster_whisper_worker.py
      - scripts/runpod-worker-start.sh
      - scripts/requirements.runpod-worker.txt
      - lib/ai/stt.ts
      - lib/ai/stt/**
      - lib/audio-processing.ts
      - lib/audio-storage.ts
      - lib/env.ts
      - lib/recording/policy.ts
      - lib/recording/validation.ts
      - lib/runpod/remote-stt-client.ts
      - lib/runpod/remote-stt-types.ts
      - lib/runpod/runtime-metadata.ts
      - lib/runpod/stt/**
      - lib/runpod/worker-stop.ts
      - lib/runtime-paths.ts
      - lib/transcript/preprocess.ts
      - lib/transcript/source.ts
      - lib/user-facing-japanese.ts

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  publish-runpod-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      - name: Normalize image owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/pararia-runpod-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=sha-${{ github.sha }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.runpod-worker
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update latest worker image variable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh variable set RUNPOD_WORKER_IMAGE --body "ghcr.io/${{ steps.owner.outputs.value }}/pararia-runpod-worker:sha-${{ github.sha }}" \
            || echo "::warning::RUNPOD_WORKER_IMAGE variable could not be updated automatically."
