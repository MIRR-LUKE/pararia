name: Backend Scope Guard

on:
  pull_request:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - backend/**
      - perf/**
      - performance/**
      - infra/**
      - runpod/**
      - worker/**
      - jobs/**
      - hardening/**
      - guardrails/**
      - feature/**

concurrency:
  group: backend-scope-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-scope-guard:
    name: backend-scope-guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_SCOPE_GUARD_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      BACKEND_SCOPE_GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      BACKEND_SCOPE_GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      BACKEND_SCOPE_GUARD_EVENT: ${{ github.event_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Self-test backend scope guard
        run: npm run test:backend-scope-guard

      - name: Enforce backend scope guard
        run: npx tsx scripts/check-backend-branch-scope.ts
