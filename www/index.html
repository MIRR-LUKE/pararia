<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PARARIA Teacher</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        background: #171717;
        color: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(219, 255, 75, 0.08), rgba(0, 0, 0, 0) 18%),
          #171717;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.04);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PARARIA Teacher</h1>
      <p>Teacher App を開けませんでした。ネットワーク接続と Capacitor の接続先設定を確認してください。</p>
    </main>
  </body>
</html>
